name: Build iOS app

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: WPhone.xcodeproj
  SCHEME: WPhone
  CONFIGURATION: Release

jobs:
  compile:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build device app without signing
        run: |
          set -uo pipefail
          set +e
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log"
          build_status=${PIPESTATUS[0]}
          if [[ "$build_status" -ne 0 ]]; then
            awk '
              /error:|BUILD FAILED/ {
                message = $0
                gsub(/%/, "%25", message)
                gsub(/\r/, "%0D", message)
                gsub(/\n/, "%0A", message)
                print "::error::" message
              }
            ' "$RUNNER_TEMP/xcodebuild.log"
          fi
          exit "$build_status"

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/$CONFIGURATION-iphoneos/WPhone.app"
          PACKET_EXTENSION_PATH="$APP_PATH/PlugIns/PacketTunnel.appex"
          APP_PUSH_EXTENSION_PATH="$APP_PATH/PlugIns/AppPushProvider.appex"

          test -d "$APP_PATH"
          test -d "$PACKET_EXTENSION_PATH"
          test -d "$APP_PUSH_EXTENSION_PATH"

          PACKAGE_PATH="$RUNNER_TEMP/unsigned-ipa"
          mkdir -p "$PACKAGE_PATH/Payload"
          ditto "$APP_PATH" "$PACKAGE_PATH/Payload/WPhone.app"
          (
            cd "$PACKAGE_PATH"
            /usr/bin/zip -qry "$RUNNER_TEMP/WPhone-unsigned.ipa" Payload
          )

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: WPhone-unsigned-ipa
          path: ${{ runner.temp }}/WPhone-unsigned.ipa
          if-no-files-found: error
